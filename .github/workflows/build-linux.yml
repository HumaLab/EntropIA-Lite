# Linux .deb release build. Manual dispatch plus published releases.
# Pinned to ubuntu-24.04 for webkit2gtk-4.1; libdbus-1-dev is required by the
# keyring sync-secret-service feature. The structure of this file is asserted by
# apps/desktop/src-tauri/scripts/tests/build-linux-workflow.Tests.ps1.

name: Build Linux (.deb)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        id: pnpm_setup
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build .deb bundle
        run: pnpm --filter @entropia/desktop tauri build --bundles deb

      - name: Smoke check .deb package
        run: |
          set -euo pipefail
          deb_file=$(ls apps/desktop/src-tauri/target/release/bundle/deb/*.deb | head -n 1)
          echo "deb_file=$deb_file"
          dpkg-deb --info "$deb_file"
          dpkg-deb --contents "$deb_file"
          if ! dpkg-deb --contents "$deb_file" | grep -q "libpdfium\.so"; then
            echo "smoke_check=fail reason=libpdfium.so missing from .deb contents"
            exit 1
          fi
          echo "smoke_check.libpdfium=ok"
          depends=$(dpkg-deb --field "$deb_file" Depends)
          echo "smoke_check.depends=$depends"
          if ! printf '%s' "$depends" | grep -q "gstreamer"; then
            echo "smoke_check=fail reason=Depends does not include gstreamer"
            exit 1
          fi
          echo "smoke_check.gstreamer=ok"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: entropia-linux-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload .deb to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" apps/desktop/src-tauri/target/release/bundle/deb/*.deb --clobber
